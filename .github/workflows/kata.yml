name: Auto Renew Katabump

on:  
  schedule:
    - cron: '22 1 * * *'  # 每天运行一次（UTC时间 03:17）
  workflow_dispatch:  # 允许手动触发

jobs:
   pre-check:
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.check.outputs.should_skip }} 
    steps:
      - name: Interval Check (Strict 4-day cycle)
        id: check
        run: |        
          # 计算当前 Unix 天数 (UTC)
          DAYS=$(( $(date -u +%s) / 86400 ))
          REMAINDER=$(( $DAYS % 4 ))
          
          if [ $REMAINDER -ne 0 ]; then
            echo "should_skip=true" >> $GITHUB_OUTPUT
          else
            echo "should_skip=false" >> $GITHUB_OUTPUT
          fi
   auto_renew_katabump:
    needs: pre-check
    if: needs.pre-check.outputs.should_skip != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write    
    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/renew_tasks
          token: ${{ secrets.GH_TOKEN }}
          
      - name: ⚙ 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      
      - name: 🛠️ 安装系统依赖和python依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11-utils xdotool scrot fonts-noto-cjk
          pip install seleniumbase requests
          seleniumbase install chromedriver
  
      - name: ⚙ 设置代理 (sing-box)
        continue-on-error: true
        env:
          NODE_LINK: ${{ secrets.KATA_LINK }}
        run: |
          bash <(wget -qO- https://main.ssss.nyc.mn/setup_proxy.sh)
  
      - name: 🚀 运行续期脚本
        env:
          KATABUMP_EMAIL: ${{ secrets.KATABUMP_EMAIL }}
          KATABUMP_PASSWORD: ${{ secrets.KATABUMP_PASSWORD }}
          TG_BOT_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_USERID }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            python3 katabump.py
