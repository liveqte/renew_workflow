name: Aclclouds-Renew

on:
  workflow_dispatch:

jobs:
  run_renewal:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/renew_tasks
          token: ${{ secrets.GH_TOKEN }}
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
  
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install seleniumbase requests
          
      - name: Setup Chrome
        run: |
          seleniumbase install chromedriver
          
      - name: Launch sing-box if VLINK set
        env:
          VLINK: ${{ secrets.KATA_VLINK }}
        run: |
            curl -LO https://amd64.ssss.nyc.mn/sb
            curl -LO https://raw.githubusercontent.com/liveqte/jupyter-notebook-deployed/refs/heads/main/vlink_to_sb.py
            chmod +x sb
            python vlink_to_sb.py $VLINK > v.json
            nohup ./sb run -c v.json > /dev/null 2>&1 &
            sleep 3
  
      - name: Run Task (CF-Bypass Mode)
        env:
          PYTHONIOENCODING: utf-8
          COOKIE: ${{ secrets.ACL_COOKIE }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_USERID }}
          PROXY: socks5://127.0.0.1:1080
        run: |
          xvfb-run -a python aclcloud-sb.py
